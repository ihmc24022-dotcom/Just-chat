<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safari Chat (Unsimplified Pro Version)</title>
    <style>
        /* ==========================================
           [1] Global CSS Variables (Explicit Definitions)
           ========================================== */
        :root { 
            --primary-color: #075e54; 
            --secondary-color: #128c7e; 
            --background-color: #ece5dd; 
            --chat-background-color: #efeae2; 
            --text-color-main: #333333; 
            --message-bubble-me: #dcf8c6; 
            --message-bubble-other: #ffffff; 
        }
        
        body.dark-mode { 
            --primary-color: #1f2c34; 
            --secondary-color: #00a884; 
            --background-color: #111b21; 
            --chat-background-color: #0b141a; 
            --text-color-main: #e9edef; 
            --message-bubble-me: #005c4b; 
            --message-bubble-other: #202c33; 
        }
        
        /* ==========================================
           [2] Base Document Styles (No Shorthands)
           ========================================== */
        body { 
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--background-color); 
            color: var(--text-color-main); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin-top: 0px;
            margin-right: 0px;
            margin-bottom: 0px;
            margin-left: 0px;
            transition-property: background-color;
            transition-duration: 0.3s;
            transition-timing-function: ease;
        }
        
        /* ==========================================
           [3] Login Screen Styles
           ========================================== */
        #login-screen { 
            position: fixed; 
            top: 0px;
            right: 0px;
            bottom: 0px;
            left: 0px;
            background-color: var(--background-color); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 1000; 
        }
        
        .login-box { 
            background-color: var(--message-bubble-other); 
            padding-top: 40px;
            padding-right: 40px;
            padding-bottom: 40px;
            padding-left: 40px;
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
            border-bottom-right-radius: 12px;
            border-bottom-left-radius: 12px;
            box-shadow: 0px 8px 24px rgba(0, 0, 0, 0.1); 
            width: 100%; 
            max-width: 320px; 
            text-align: center; 
        }
        
        .login-box input { 
            width: 100%; 
            padding-top: 12px;
            padding-bottom: 12px;
            padding-left: 12px;
            padding-right: 12px;
            margin-top: 10px;
            margin-bottom: 10px;
            border-width: 1px;
            border-style: solid;
            border-color: #dddddd; 
            border-top-left-radius: 6px;
            border-top-right-radius: 6px;
            border-bottom-right-radius: 6px;
            border-bottom-left-radius: 6px;
            box-sizing: border-box; 
            font-size: 16px; 
            background-color: transparent; 
            color: var(--text-color-main); 
        }
        
        .login-box button { 
            width: 100%; 
            padding-top: 12px;
            padding-bottom: 12px;
            background-color: var(--secondary-color); 
            color: #ffffff; 
            border-width: 0px;
            border-style: none;
            border-top-left-radius: 6px;
            border-top-right-radius: 6px;
            border-bottom-right-radius: 6px;
            border-bottom-left-radius: 6px;
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 15px; 
        }

        /* ==========================================
           [4] Main Application Layout
           ========================================== */
        #main-app { 
            display: none; 
            width: 100%; 
            max-width: 1000px; 
            height: 90vh; 
            background-color: var(--message-bubble-other); 
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
            border-bottom-right-radius: 12px;
            border-bottom-left-radius: 12px;
            box-shadow: 0px 8px 32px rgba(0, 0, 0, 0.1); 
            overflow-x: hidden; 
            overflow-y: hidden;
            flex-direction: row; 
        }
        
        /* Sidebar Styles */
        #sidebar { 
            width: 300px; 
            border-right-width: 1px;
            border-right-style: solid;
            border-right-color: rgba(0, 0, 0, 0.1); 
            display: flex; 
            flex-direction: column; 
            background-color: var(--message-bubble-other); 
        }
        
        .sidebar-header { 
            padding-top: 15px;
            padding-bottom: 15px;
            padding-left: 15px;
            padding-right: 15px;
            background-color: var(--primary-color); 
            color: #ffffff; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        
        .icon-btn { 
            background-color: transparent; 
            border-width: 0px; 
            color: inherit; 
            cursor: pointer; 
            font-size: 18px; 
            padding-top: 5px;
            padding-bottom: 5px;
            padding-left: 5px;
            padding-right: 5px;
            border-top-left-radius: 50%;
            border-top-right-radius: 50%;
            border-bottom-right-radius: 50%;
            border-bottom-left-radius: 50%;
        }
        
        /* Contact List */
        #contact-list { 
            flex-grow: 1; 
            overflow-y: auto; 
        }
        
        .list-item { 
            display: flex; 
            align-items: center; 
            padding-top: 15px;
            padding-bottom: 15px;
            padding-left: 15px;
            padding-right: 15px;
            border-bottom-width: 1px;
            border-bottom-style: solid;
            border-bottom-color: rgba(0, 0, 0, 0.05); 
            cursor: pointer; 
            gap: 15px; 
        }
        
        .list-item.active { 
            background-color: rgba(0, 0, 0, 0.05); 
        }
        
        .avatar { 
            width: 45px; 
            height: 45px; 
            background-color: #dddddd; 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 20px; 
        }
        
        /* Sidebar Actions */
        .sidebar-actions { 
            padding-top: 15px;
            padding-bottom: 15px;
            padding-left: 15px;
            padding-right: 15px;
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            border-top-width: 1px;
            border-top-style: solid;
            border-top-color: rgba(0, 0, 0, 0.1); 
        }

        .sidebar-actions button { 
            padding-top: 10px;
            padding-bottom: 10px;
            border-width: 0px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            color: #ffffff; 
        }

        /* Chat Area Styles */
        #chat-area { 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            background-color: var(--chat-background-color); 
            position: relative; 
        }
        
        .chat-header { 
            padding-top: 15px;
            padding-bottom: 15px;
            padding-left: 15px;
            padding-right: 15px;
            background-color: var(--primary-color); 
            color: #ffffff; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        
        /* Messages Container */
        #messages-container { 
            flex-grow: 1; 
            padding-top: 20px;
            padding-bottom: 20px;
            padding-left: 20px;
            padding-right: 20px;
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
        }
        
        .msg-wrapper { 
            display: flex; 
            flex-direction: column; 
            max-width: 65%; 
        }
        
        .msg-wrapper.me { 
            align-self: flex-end; 
        }
        
        .msg-wrapper.other { 
            align-self: flex-start; 
        }
        
        .msg-bubble { 
            padding-top: 10px;
            padding-bottom: 10px;
            padding-left: 15px;
            padding-right: 15px;
            border-radius: 12px; 
            position: relative; 
            word-wrap: break-word; 
            box-shadow: 0px 1px 2px rgba(0, 0, 0, 0.1); 
        }
        
        .msg-wrapper.me .msg-bubble { 
            background-color: var(--message-bubble-me); 
            border-top-right-radius: 2px; 
        }
        
        .msg-wrapper.other .msg-bubble { 
            background-color: var(--message-bubble-other); 
            border-top-left-radius: 2px; 
        }
        
        .msg-sender { 
            font-size: 12px; 
            font-weight: bold; 
            color: #e53935; 
            margin-bottom: 4px; 
        }
        
        .msg-time { 
            font-size: 10px; 
            color: rgba(0, 0, 0, 0.5); 
            text-align: right; 
            margin-top: 5px; 
        }

        .msg-media { 
            max-width: 200px; 
            border-radius: 8px; 
            cursor: pointer; 
        }
        
        .msg-sticker { 
            width: 120px; 
            height: 120px; 
            object-fit: contain; 
            background-color: transparent !important; 
            box-shadow: none !important; 
        }

        /* Input Area */
        .input-area { 
            padding-top: 15px;
            padding-bottom: 15px;
            padding-left: 15px;
            padding-right: 15px;
            background-color: var(--message-bubble-other); 
            display: flex; 
            gap: 10px; 
            align-items: center; 
        }
        
        .input-area input[type="text"] { 
            flex-grow: 1; 
            padding-top: 12px;
            padding-bottom: 12px;
            padding-left: 15px;
            padding-right: 15px;
            border-radius: 24px; 
            border-width: 1px;
            border-style: solid;
            border-color: rgba(0, 0, 0, 0.1); 
            background-color: var(--chat-background-color); 
            color: var(--text-color-main); 
            outline: none; 
        }
        
        .input-area button { 
            background-color: var(--secondary-color); 
            color: #ffffff; 
            border-width: 0px; 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            cursor: pointer; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 18px; 
        }

        /* Media Panels */
        .media-panel { 
            position: absolute; 
            bottom: 80px; 
            right: 20px; 
            width: 300px; 
            height: 350px; 
            background-color: var(--message-bubble-other); 
            border-radius: 12px; 
            box-shadow: 0px 8px 24px rgba(0, 0, 0, 0.2); 
            display: none; 
            flex-direction: column; 
            z-index: 10; 
            border-width: 1px;
            border-style: solid;
            border-color: rgba(0, 0, 0, 0.1); 
        }
        
        .media-panel-header { 
            padding-top: 10px;
            padding-bottom: 10px;
            padding-left: 15px;
            padding-right: 15px;
            border-bottom-width: 1px;
            border-bottom-style: solid;
            border-bottom-color: rgba(0, 0, 0, 0.1); 
            display: flex; 
            justify-content: space-between; 
            font-weight: bold; 
        }
        
        .media-grid { 
            flex-grow: 1; 
            padding-top: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
            padding-right: 10px;
            overflow-y: auto; 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; 
        }

        /* Modals */
        .modal-overlay { 
            position: fixed; 
            top: 0px;
            right: 0px;
            bottom: 0px;
            left: 0px;
            background-color: rgba(0, 0, 0, 0.5); 
            display: none; 
            justify-content: center; 
            align-items: center; 
            z-index: 2000; 
        }
        
        .modal-content { 
            background-color: var(--message-bubble-other); 
            padding-top: 25px;
            padding-bottom: 25px;
            padding-left: 25px;
            padding-right: 25px;
            border-radius: 12px; 
            width: 100%; 
            max-width: 400px; 
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color: var(--primary-color); margin-top: 0px;">Safari Chat Pro</h2>
            <div>
                <input type="text" id="login-username" placeholder="請輸入帳號 (Enter Username)">
            </div>
            <div>
                <input type="password" id="login-password" placeholder="請輸入密碼 (Enter Password)">
            </div>
            <div>
                <button id="btn-login">進入聊天室 (Enter Chat)</button>
            </div>
        </div>
    </div>

    <div id="main-app">
        
        <div id="sidebar">
            <div class="sidebar-header">
                <div style="display: flex; align-items: center; gap: 10px; font-weight: bold;">
                    <div class="avatar" id="my-avatar">👤</div>
                    <span id="my-username">載入中... (Loading...)</span>
                </div>
                <div>
                    <button class="icon-btn" id="btn-theme" title="Toggle Dark Mode">🌓</button>
                    <button class="icon-btn" id="btn-logout" title="Logout">🚪</button>
                </div>
            </div>
            
            <div id="contact-list">
                <div class="list-item active" id="room-global" onclick="if(window.AppCore && window.AppCore.switchRoom) { window.AppCore.switchRoom('global', '公開大廳', '🌍'); }">
                    <div class="avatar">🌍</div>
                    <div style="flex-grow: 1; font-weight: bold;">公開大廳 (Global Room)</div>
                </div>
            </div>
            
            <div class="sidebar-actions">
                <button id="btn-add-friend" style="background-color: #3498db;">➕ 加入好友 (Add Friend)</button>
                <button id="btn-create-group" style="background-color: #f39c12;">👥 建立群組 (Create Group)</button>
            </div>
        </div>

        <div id="chat-area">
            <div class="chat-header">
                <div style="display: flex; align-items: center; gap: 10px; font-weight: bold;">
                    <div class="avatar" id="current-room-icon" style="color: #000000;">🌍</div>
                    <span id="current-room-name">公開大廳 (Global Room)</span>
                </div>
            </div>
            
            <div id="messages-container">
                </div>
            
            <div id="panel-sticker" class="media-panel">
                <div class="media-panel-header">
                    <span>傳送貼圖 (Send Sticker)</span>
                    <span style="cursor: pointer;" onclick="document.getElementById('panel-sticker').style.display='none'">✕</span>
                </div>
                <div class="media-grid" id="sticker-grid"></div>
            </div>

            <div id="panel-gif" class="media-panel">
                <div class="media-panel-header">
                    <span>搜尋 GIF (Search GIF)</span>
                    <span style="cursor: pointer;" onclick="document.getElementById('panel-gif').style.display='none'">✕</span>
                </div>
                <div style="padding: 10px; border-bottom-width: 1px; border-bottom-style: solid; border-bottom-color: rgba(0,0,0,0.1);">
                    <input type="text" id="gif-search-input" placeholder="Type keyword & hit Enter" style="width: 100%; padding: 8px; box-sizing: border-box; border-radius: 15px; border: 1px solid #ccc;">
                </div>
                <div class="media-grid" id="gif-grid"></div>
            </div>

            <div class="input-area">
                <input type="file" id="file-upload" accept="image/*" style="display: none;">
                <button style="background-color: transparent; color: var(--text-color-main);" title="Upload Image" onclick="document.getElementById('file-upload').click()">📎</button>
                <button style="background-color: transparent; color: var(--text-color-main);" title="Send GIF" onclick="document.getElementById('panel-gif').style.display = document.getElementById('panel-gif').style.display === 'flex' ? 'none' : 'flex'; document.getElementById('panel-sticker').style.display = 'none';">🎞️</button>
                <button style="background-color: transparent; color: var(--text-color-main);" title="Send Sticker" onclick="document.getElementById('panel-sticker').style.display = document.getElementById('panel-sticker').style.display === 'flex' ? 'none' : 'flex'; document.getElementById('panel-gif').style.display = 'none';">🤩</button>
                
                <input type="text" id="msg-input" placeholder="輸入訊息... (Type a message...)">
                <button id="btn-send">➤</button>
            </div>
        </div>
    </div>

    <div id="modal-add-friend" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin-top: 0px;">加入好友 (Add Friend)</h3>
            <input type="text" id="friend-username-input" placeholder="Enter username..." style="width: 100%; padding: 10px; margin-top: 15px; margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.1); border-radius: 6px; box-sizing: border-box;">
            <div style="display: flex; justify-content: flex-end; gap: 10px;">
                <button style="padding: 8px 15px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; background-color: #cccccc; color: #333333;" onclick="document.getElementById('modal-add-friend').style.display='none'">取消 (Cancel)</button>
                <button id="btn-confirm-add-friend" style="padding: 8px 15px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; background-color: var(--secondary-color); color: #ffffff;">加入 (Add)</button>
            </div>
        </div>
    </div>

    <div id="modal-create-group" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin-top: 0px;">建立群組 (Create Group)</h3>
            <input type="text" id="group-name-input" placeholder="Group Name..." style="width: 100%; padding: 10px; margin-top: 15px; margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.1); border-radius: 6px; box-sizing: border-box;">
            <div id="group-member-selection" style="margin-bottom: 15px; max-height: 150px; overflow-y: auto;">
                </div>
            <div style="display: flex; justify-content: flex-end; gap: 10px;">
                <button style="padding: 8px 15px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; background-color: #cccccc; color: #333333;" onclick="document.getElementById('modal-create-group').style.display='none'">取消 (Cancel)</button>
                <button id="btn-confirm-create-group" style="padding: 8px 15px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; background-color: var(--secondary-color); color: #ffffff;">建立 (Create)</button>
            </div>
        </div>
    </div>
    <script type="module">
    // 刻意把所有可能用到的 Firebase 工具都明確 import 進來
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
        getDatabase, 
        ref as databaseReference, 
        push as databasePush, 
        onValue as databaseOnValue, 
        set as databaseSet, 
        get as databaseGet, 
        update as databaseUpdate, 
        onDisconnect as databaseOnDisconnect, 
        serverTimestamp as databaseServerTimestamp 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // ✅ 這裡已經替換成你提供的真實 Firebase 金鑰！
    var firebaseConfigurationOptions = {
        apiKey: "AIzaSyDY9uX6jJW0HMOGQgoel1hR-3ReLlQjw-A",
        authDomain: "chat-54795.firebaseapp.com",
        databaseURL: "https://chat-54795-default-rtdb.firebaseio.com", // 幫你補上 Realtime DB 網址
        projectId: "chat-54795",
        storageBucket: "chat-54795.firebasestorage.app",
        messagingSenderId: "915552330387",
        appId: "1:915552330387:web:c38152f34d3aa7abe62366"
    };

    var firebaseApplicationInstance;
    var firebaseDatabaseInstance;

    try {
        console.log("開始執行 Firebase 初始化程序...");
        firebaseApplicationInstance = initializeApp(firebaseConfigurationOptions);
        // 使用 getDatabase 確保和我們的聊天室邏輯相容
        firebaseDatabaseInstance = getDatabase(firebaseApplicationInstance);
        
        // 將資料庫實例掛載到全域 window 物件，讓後面的部分可以使用
        window.dbInstance = firebaseDatabaseInstance;
        console.log("✅ Firebase 初始化成功！資料庫實例已綁定至 window.dbInstance。");
    } catch (initializationError) {
        console.error("❌ 嚴重錯誤：無法初始化 Firebase。", initializationError);
        alert("系統錯誤：資料庫連線失敗。請檢查設定檔。");
    }

    // ==========================================
    // [6] 全域狀態管理 (傳統明確物件寫法)
    // ==========================================
    window.AppCore = {
        state: {
            currentUser: null,
            currentRoom: 'global',
            friends: [],
            groups: [],
            isOnline: false,
            lastActivityTimestamp: Date.now()
        }
    };

    // 安全更新狀態的輔助函式
    window.AppCore.setState = function(newStateObject) {
        // 使用傳統的 Object.assign 而不是解構賦值
        Object.assign(window.AppCore.state, newStateObject);
        console.log("🔄 全域狀態已更新。目前的狀態為：", window.AppCore.state);
    };

    // ==========================================
    // [7] DOM 初始化與事件監聽綁定
    // ==========================================
    window.AppCore.initializeDOMEventListeners = function() {
        console.log("正在綁定 DOM 事件監聽器...");
        
        var loginButtonElement = document.getElementById('btn-login');
        if (loginButtonElement !== null) {
            loginButtonElement.addEventListener('click', function(event) {
                console.log("使用者點擊了登入按鈕。");
                window.AppCore.executeLoginProcess();
            });
        } else {
            console.warn("在 DOM 中找不到登入按鈕 (btn-login)。");
        }

        var passwordInputElement = document.getElementById('login-password');
        if (passwordInputElement !== null) {
            passwordInputElement.addEventListener('keypress', function(keyboardEvent) {
                if (keyboardEvent.key === 'Enter') {
                    console.log("使用者在密碼框按下了 Enter 鍵。");
                    window.AppCore.executeLoginProcess();
                }
            });
        }

        var logoutButtonElement = document.getElementById('btn-logout');
        if (logoutButtonElement !== null) {
            logoutButtonElement.addEventListener('click', function(event) {
                console.log("使用者點擊了登出按鈕。");
                window.AppCore.executeLogoutProcess();
            });
        }

        // 發送訊息按鈕綁定
        var sendMessageButton = document.getElementById('btn-send');
        if (sendMessageButton !== null) {
            sendMessageButton.addEventListener('click', function() {
                if (window.AppCore.sendMessage) {
                    window.AppCore.sendMessage('text');
                } else {
                    console.error("sendMessage 函式尚未定義！");
                }
            });
        }

        var messageInputBox = document.getElementById('msg-input');
        if (messageInputBox !== null) {
            messageInputBox.addEventListener('keypress', function(keyboardEvent) {
                if (keyboardEvent.key === 'Enter') {
                    if (window.AppCore.sendMessage) {
                        window.AppCore.sendMessage('text');
                    }
                }
            });
        }
        
        var fileUploadElement = document.getElementById('file-upload');
        if (fileUploadElement !== null) {
            fileUploadElement.addEventListener('change', function(event) {
                if (window.AppCore.handleFileUpload) {
                    window.AppCore.handleFileUpload(event);
                }
            });
        }

        window.AppCore.checkLocalStorageForExistingSession();
    };

    // ==========================================
    // [8] 驗證與登入邏輯 (繁瑣展開版)
    // ==========================================
    window.AppCore.checkLocalStorageForExistingSession = function() {
        console.log("正在檢查 localStorage 是否有先前的登入紀錄...");
        var savedUsername = localStorage.getItem('safari_chat_user_session');
        
        if (savedUsername !== null && savedUsername !== "") {
            console.log("🔍 發現先前的登入紀錄，使用者：" + savedUsername);
            var usernameInputBox = document.getElementById('login-username');
            if (usernameInputBox !== null) {
                usernameInputBox.value = savedUsername;
            }
        } else {
            console.log("沒有找到先前的登入紀錄。");
        }
    };

    window.AppCore.executeLoginProcess = async function() {
        var usernameInputElement = document.getElementById('login-username');
        var passwordInputElement = document.getElementById('login-password');
        var loginButtonElement = document.getElementById('btn-login');

        if (usernameInputElement === null || passwordInputElement === null) {
            console.error("找不到登入輸入框元素！");
            return;
        }

        var rawUsername = usernameInputElement.value;
        var rawPassword = passwordInputElement.value;
        
        // 嚴格清除前後空白
        var cleanUsername = rawUsername.trim();
        var cleanPassword = rawPassword.trim();

        // 非常明確的防呆驗證
        if (cleanUsername === "") {
            alert("帳號不能為空！");
            usernameInputElement.focus();
            return;
        }
        
        if (cleanPassword === "") {
            alert("密碼不能為空！");
            passwordInputElement.focus();
            return;
        }
        
        if (cleanUsername.length < 3) {
            alert("帳號長度至少需 3 個字元。");
            usernameInputElement.focus();
            return;
        }
        
        if (cleanPassword.length < 6) {
            alert("密碼長度至少需 6 個字元。");
            passwordInputElement.focus();
            return;
        }

        // 將 UI 設定為載入中狀態
        loginButtonElement.disabled = true;
        loginButtonElement.innerText = "驗證中...";

        var userDatabasePath = 'users/' + cleanUsername;
        var userReference = databaseReference(window.dbInstance, userDatabasePath);
        
        try {
            console.log("正在從資料庫讀取使用者資料...");
            var databaseSnapshot = await databaseGet(userReference);
            
            if (databaseSnapshot.exists() === true) {
                console.log("找到使用者紀錄。正在驗證密碼...");
                var userRecordData = databaseSnapshot.val();
                
                if (userRecordData.password !== cleanPassword) {
                    throw new Error("密碼錯誤，請再試一次。");
                }
                console.log("✅ 密碼驗證成功！");
            } else {
                console.log("找不到此使用者。正在建立新帳號...");
                var newUserRecordObject = {
                    password: cleanPassword,
                    createdAt: databaseServerTimestamp(),
                    lastLoginDate: databaseServerTimestamp(),
                    status: "online",
                    friends: { 'System': true } // 預設好友
                };
                
                await databaseSet(userReference, newUserRecordObject);
                console.log("✅ 新帳號已成功寫入資料庫。");
                alert("新帳號註冊成功！系統將自動為您登入...");
            }

            // 執行登入成功後的程序
            window.AppCore.handleSuccessfulLogin(cleanUsername);

        } catch (authenticationError) {
            console.error("登入過程中發生錯誤:", authenticationError);
            alert(authenticationError.message || "無法連線至伺服器，請檢查您的網路狀態。");
            
            // 恢復 UI 狀態
            loginButtonElement.disabled = false;
            loginButtonElement.innerText = "進入聊天室";
        }

    window.AppCore.setupPresenceMonitoring = function() {
        var currentActiveUser = window.AppCore.state.currentUser;
        
        if (currentActiveUser === null) {
            console.warn("無法設定連線狀態監控：目前沒有已登入的使用者。");
            return;
        }

        var firebaseConnectedReference = databaseReference(window.dbInstance, '.info/connected');
        var userStatusPath = 'users/' + currentActiveUser + '/status';
        var userStatusReference = databaseReference(window.dbInstance, userStatusPath);
        
        databaseOnValue(firebaseConnectedReference, function(snapshot) {
            var isConnected = snapshot.val();
            
            if (isConnected === true) {
                console.log("📡 客戶端已成功連線至 Firebase 即時資料庫。");
                window.AppCore.setState({ isOnline: true });
                databaseSet(userStatusReference, "online");
                databaseOnDisconnect(userStatusReference).set("offline");
            } else {
                console.warn("⚠️ 客戶端已與 Firebase 斷開連線。");
                window.AppCore.setState({ isOnline: false });
            }
        });

    // [10] 聊天室房間切換邏輯 (Room Switching)
    // ==========================================
    // 為了避免重複監聽，我們需要一個變數來儲存目前的監聽器取消函式
    var currentRoomListenerUnsubscribe = null;

    window.AppCore.switchRoom = function(roomId, roomName, roomIcon) {
        console.log("準備切換房間。目標房間 ID：" + roomId + "，名稱：" + roomName);

        // 1. 更新全域狀態
        window.AppCore.setState({ currentRoom: roomId });

        // 2. 更新聊天室標題 UI
        var currentRoomNameElement = document.getElementById('current-room-name');
        var currentRoomIconElement = document.getElementById('current-room-icon');
        
        if (currentRoomNameElement !== null) {
            currentRoomNameElement.innerText = roomName;
        }
        if (currentRoomIconElement !== null) {
            currentRoomIconElement.innerText = roomIcon;
        }

        // 3. 清空目前的訊息容器
        var messagesContainerElement = document.getElementById('messages-container');
        if (messagesContainerElement !== null) {
            messagesContainerElement.innerHTML = '';
            console.log("已清空舊房間的訊息畫面。");
        }

        // 4. 解除舊房間的資料庫監聽 (如果有的話)
        if (typeof currentRoomListenerUnsubscribe === 'function') {
            console.log("正在解除舊房間的監聽器...");
            currentRoomListenerUnsubscribe();
            currentRoomListenerUnsubscribe = null;
        }

        // 5. 設定新房間的資料庫路徑並開始監聽
        var roomMessagesPath = 'messages/' + roomId;
        var roomMessagesReference = databaseReference(window.dbInstance, roomMessagesPath);
        
        console.log("開始監聽新房間資料路徑：" + roomMessagesPath);
        
        // 這裡我們使用 onValue 來監聽整個訊息節點的變化
        // ⚠️ 在正式大型專案中，通常會使用 query、limitToLast 和 onChildAdded 來優化效能
        currentRoomListenerUnsubscribe = databaseOnValue(roomMessagesReference, function(snapshot) {
            console.log("收到資料庫訊息更新事件！");
            
            // 每次收到更新，先清空畫面 (這是最基礎的暴力渲染法)
            if (messagesContainerElement !== null) {
                messagesContainerElement.innerHTML = '';
            }

            if (snapshot.exists() === true) {
                var allMessages = snapshot.val();
                var messageKeys = Object.keys(allMessages);
                
                // 為了確保訊息按時間排序 (Firebase push key 本身包含時間戳)
                messageKeys.sort(); 

                for (var i = 0; i < messageKeys.length; i++) {
                    var currentKey = messageKeys[i];
                    var messageData = allMessages[currentKey];
                    window.AppCore.renderMessage(currentKey, messageData);
                }
                
                // 捲動到最底部
                window.AppCore.scrollToBottom();
            } else {
                console.log("此房間目前沒有任何訊息。");
            }
        });

        // 6. 更新側邊欄的活動狀態 (標示哪個房間被選取)
        var allListItems = document.querySelectorAll('.list-item');
        for (var j = 0; j < allListItems.length; j++) {
            allListItems[j].classList.remove('active');
        }
        
        var activeRoomElement = document.getElementById('room-' + roomId);
        if (activeRoomElement !== null) {
            activeRoomElement.classList.add('active');
        }
    };

    // ==========================================
    // [11] 訊息發送邏輯 (Message Sending)
    // ==========================================
    window.AppCore.sendMessage = async function(messageType, mediaContentUrl) {
        var currentUser = window.AppCore.state.currentUser;
        var currentRoom = window.AppCore.state.currentRoom;

        if (currentUser === null) {
            alert("請先登入才能發送訊息！");
            return;
        }

        var messageContent = "";
        var messageInputBox = document.getElementById('msg-input');

        // 判斷訊息類型
        if (messageType === 'text') {
            if (messageInputBox === null) return;
            var rawText = messageInputBox.value;
            messageContent = rawText.trim();
            
            if (messageContent === "") {
                console.log("文字訊息為空，取消發送。");
                return; // 不發送空訊息
            }
        } else if (messageType === 'image' || messageType === 'sticker' || messageType === 'gif') {
            // 如果是媒體類型，內容就是網址
            messageContent = mediaContentUrl;
        } else {
            console.error("未知的訊息類型：" + messageType);
            return;
        }

        console.log("準備發送訊息，類型：" + messageType + "，內容：" + messageContent);

        // 建構要發送的訊息物件
        var newMessageObject = {
            sender: currentUser,
            type: messageType,
            content: messageContent,
            timestamp: Date.now() // 使用本地時間作為備用
            // ⚠️ 理想情況下會使用 databaseServerTimestamp()，但在 onValue 渲染時本地時間比較好處理
        };

        var roomMessagesPath = 'messages/' + currentRoom;
        var roomMessagesReference = databaseReference(window.dbInstance, roomMessagesPath);

        try {
            // 使用 push 產生一個隨機且唯一 ID
            await databasePush(roomMessagesReference, newMessageObject);
            console.log("✅ 訊息發送成功寫入資料庫！");

            // 如果是文字訊息，發送後清空輸入框並關閉其他面板
            if (messageType === 'text' && messageInputBox !== null) {
                messageInputBox.value = '';
                messageInputBox.focus();
            }

            // 關閉可能開啟的媒體面板
            var stickerPanel = document.getElementById('panel-sticker');
            var gifPanel = document.getElementById('panel-gif');
            if (stickerPanel !== null) stickerPanel.style.display = 'none';
            if (gifPanel !== null) gifPanel.style.display = 'none';

        } catch (sendError) {
            console.error("❌ 訊息發送失敗：", sendError);
            alert("發送訊息失敗，請檢查網路連線。");
        }
    };

    // ==========================================
    // [12] 訊息畫面渲染邏輯 (Message Rendering)
    // ==========================================
    window.AppCore.renderMessage = function(messageId, messageData) {
        var messagesContainerElement = document.getElementById('messages-container');
        if (messagesContainerElement === null) {
            console.error("找不到訊息容器，無法渲染訊息！");
            return;
        }

        var currentUser = window.AppCore.state.currentUser;
        var isMe = (messageData.sender === currentUser);

        // 1. 建立最外層的包裹器 (Wrapper)
        var messageWrapperElement = document.createElement('div');
        messageWrapperElement.classList.add('msg-wrapper');
        if (isMe === true) {
            messageWrapperElement.classList.add('me');
        } else {
            messageWrapperElement.classList.add('other');
        }

        // 2. 建立發送者名稱顯示 (如果是自己發的就不顯示名稱)
        if (isMe === false) {
            var senderNameElement = document.createElement('div');
            senderNameElement.classList.add('msg-sender');
            senderNameElement.innerText = messageData.sender;
            messageWrapperElement.appendChild(senderNameElement);
        }

        // 3. 建立對話氣泡本體
        var messageBubbleElement = document.createElement('div');
        messageBubbleElement.classList.add('msg-bubble');

        // 4. 根據訊息類型塞入不同內容
        if (messageData.type === 'text') {
            // 純文字
            var textNode = document.createTextNode(messageData.content);
            messageBubbleElement.appendChild(textNode);
            
        } else if (messageData.type === 'image' || messageData.type === 'gif') {
            // 圖片或 GIF
            var imageElement = document.createElement('img');
            imageElement.setAttribute('src', messageData.content);
            imageElement.classList.add('msg-media');
            // 點擊圖片可以在新分頁打開
            imageElement.addEventListener('click', function() {
                window.open(messageData.content, '_blank');
            });
            messageBubbleElement.appendChild(imageElement);
            
            // 由於圖片需要載入時間，載入完成後再次捲動到底部
            imageElement.onload = function() {
                window.AppCore.scrollToBottom();
            };
            
        } else if (messageData.type === 'sticker') {
            // 貼圖 (去背大圖)
            var stickerElement = document.createElement('img');
            stickerElement.setAttribute('src', messageData.content);
            stickerElement.classList.add('msg-sticker');
            messageBubbleElement.classList.remove('msg-bubble'); // 移除預設背景
            messageBubbleElement.appendChild(stickerElement);
            
            stickerElement.onload = function() {
                window.AppCore.scrollToBottom();
            };
        }

        // 5. 建立時間戳記
        var timeElement = document.createElement('div');
        timeElement.classList.add('msg-time');
        var messageDateObject = new Date(messageData.timestamp);
        var hours = messageDateObject.getHours().toString().padStart(2, '0');
        var minutes = messageDateObject.getMinutes().toString().padStart(2, '0');
        timeElement.innerText = hours + ':' + minutes;
        
        // 將時間加入氣泡內
        messageBubbleElement.appendChild(timeElement);

        // 6. 將氣泡加入包裹器，再將包裹器加入容器
        messageWrapperElement.appendChild(messageBubbleElement);
        messagesContainerElement.appendChild(messageWrapperElement);
    };

    // 輔助函式：將對話框捲動到最底部
    window.AppCore.scrollToBottom = function() {
        var messagesContainerElement = document.getElementById('messages-container');
        if (messagesContainerElement !== null) {
            messagesContainerElement.scrollTop = messagesContainerElement.scrollHeight;
        }
    };

    // [13] 覆寫圖片上傳邏輯 (使用 Cloudinary API 囉嗦版)
    // ==========================================
    const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/drwflposq/image/upload";
    const CLOUDINARY_UPLOAD_PRESET = "ml_default";

    window.AppCore.handleFileUpload = async function(event) {
        if (typeof event.target.files === 'undefined' || event.target.files.length === 0) {
            console.log("使用者取消了檔案選擇。");
            return;
        }

        const selectedFile = event.target.files[0];
        console.log("準備上傳圖片至 Cloudinary，檔案名稱：" + selectedFile.name);

        // 建立 FormData 物件來包裝要上傳的資料
        const formData = new FormData();
        formData.append("file", selectedFile);
        formData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);

        try {
            console.log("正在發送 POST 請求至 Cloudinary...");
            const response = await fetch(CLOUDINARY_URL, {
                method: "POST",
                body: formData
            });

            if (response.ok === false) {
                throw new Error("Cloudinary 上傳失敗，HTTP 狀態碼：" + response.status);
            }

            const responseData = await response.json();
            console.log("Cloudinary 上傳成功！取得圖片網址：" + responseData.secure_url);

            // 呼叫第 3 部分寫好的 sendMessage 函式，並標記為 image
            window.AppCore.sendMessage('image', responseData.secure_url);

        } catch (uploadError) {
            console.error("圖片上傳發生嚴重錯誤：", uploadError);
            alert("圖片上傳失敗，請檢查網路連線或 Cloudinary 設定。");
        }
    };

    // ==========================================
    // [14] Tenor GIF 搜尋邏輯 (手動建構 DOM 版)
    // ==========================================
    const TENOR_API_KEY = "LIVDSRZULELA";
    const gifSearchInputElement = document.getElementById('gif-search-input');
    const gifGridElement = document.getElementById('gif-grid');

    window.AppCore.searchGIFs = async function(searchQuery) {
        if (gifGridElement === null) {
            console.error("找不到 GIF 顯示網格元素！");
            return;
        }

        // 清空目前的 GIF 網格，並顯示載入中
        gifGridElement.innerHTML = '';
        const loadingText = document.createTextNode("搜尋中 (Searching)...");
        gifGridElement.appendChild(loadingText);

        // 建構 Tenor API 網址 (使用 v1 API 格式)
        let apiUrl = "https://g.tenor.com/v1/search?q=" + encodeURIComponent(searchQuery) + "&key=" + TENOR_API_KEY + "&limit=12";
        
        // 如果沒有輸入關鍵字，就抓取熱門 GIF
        if (searchQuery === "" || typeof searchQuery === 'undefined') {
            apiUrl = "https://g.tenor.com/v1/trending?key=" + TENOR_API_KEY + "&limit=12";
        }

        try {
            console.log("正在請求 Tenor API，網址：" + apiUrl);
            const response = await fetch(apiUrl);
            
            if (response.ok === false) {
                throw new Error("Tenor API 請求失敗");
            }

            const data = await response.json();
            const resultsArray = data.results;

            // 清空載入中文字
            gifGridElement.innerHTML = '';

            if (resultsArray.length === 0) {
                const noResultText = document.createTextNode("找不到相關 GIF");
                gifGridElement.appendChild(noResultText);
                return;
            }

            // 傳統 for 迴圈展開渲染每一個 GIF
            for (let i = 0; i < resultsArray.length; i++) {
                const currentGifObj = resultsArray[i];
                // 抓取適合的預覽圖片 URL 和實際 GIF URL
                const previewUrl = currentGifObj.media[0].nanogif.url;
                const actualGifUrl = currentGifObj.media[0].gif.url;

                const gifImgElement = document.createElement('img');
                gifImgElement.setAttribute('src', previewUrl);
                gifImgElement.style.width = "100%";
                gifImgElement.style.height = "100px";
                gifImgElement.style.objectFit = "cover";
                gifImgElement.style.borderRadius = "8px";
                gifImgElement.style.cursor = "pointer";

                // 綁定點擊事件，發送實際的 GIF URL
                gifImgElement.addEventListener('click', function() {
                    console.log("使用者選擇了 GIF：" + actualGifUrl);
                    window.AppCore.sendMessage('gif', actualGifUrl);
                });

                gifGridElement.appendChild(gifImgElement);
            }

        } catch (gifError) {
            console.error("取得 GIF 時發生錯誤：", gifError);
            gifGridElement.innerHTML = "載入失敗 (Load Failed)";
        }
    };

                console.log("使用者點擊了貼圖：" + currentStickerUrl);
                window.AppCore.sendMessage('sticker', currentStickerUrl);
            });

            stickerGridElement.appendChild(stickerImg);
        }
        console.log("貼圖面板初始化完成。");
    };

    // ==========================================
    // [16] 深色模式切換 (Dark Mode Toggle)
    // ==========================================
    const themeToggleButton = document.getElementById('btn-theme');
    if (themeToggleButton !== null) {
        themeToggleButton.addEventListener('click', function() {
            console.log("切換深色/淺色模式");
            const bodyElement = document.body;
            
            if (bodyElement.classList.contains('dark-mode')) {
                bodyElement.classList.remove('dark-mode');
                themeToggleButton.innerText = "🌓";
            } else {
                bodyElement.classList.add('dark-mode');
                themeToggleButton.innerText = "☀️";
            }
        });
    }

    // ==========================================
    // [17] 啟動應用程式的最後初始化呼叫
    // ==========================================
    // 當 DOM 準備好且 Firebase 初始化後，最後呼叫貼圖載入
    window.addEventListener('DOMContentLoaded', function() {
        console.log("執行最後的輔助面板初始化...");
        window.AppCore.initializeStickers();
    });

</script>
</body>
</html>
